name: Build lsdriver.ko (GKI 5.10)

on:
  workflow_dispatch:
  push:
    branches: [main, master]

jobs:
  # Step 1: upload source code as artifact (required by android-kernel-build-action)
  upload-source:
    name: Upload module source
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload lsdriver source
        uses: actions/upload-artifact@v4
        with:
          name: lsdriver
          path: lsdriver/

  # Step 2: build .ko using GKI kernel
  build:
    name: Build for ${{ matrix.tag }}-${{ matrix.arch }}
    needs: upload-source
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        tag:
          - android12-5.10
          - android13-5.10
        arch:
          - aarch64

    steps:
      - name: Maximize build space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          temp-reserve-mb: 2048
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'

      - name: Build kernel module
        uses: feicong/android-kernel-build-action@v1
        with:
          arch: ${{ matrix.arch }}
          tag: ${{ matrix.tag }}
          module-name: lsdriver
          module-path: lsdriver

      - name: Extract .ko from kernel image artifact
        run: |
          mkdir -p ko-output
          # The action uploads Image-<tag>-<arch> which contains kernel images + .ko files
          # We only need lsdriver.ko

      - name: Upload .ko artifact
        uses: actions/upload-artifact@v4
        with:
          name: lsdriver-${{ matrix.tag }}-${{ matrix.arch }}
          path: |
            out/lsdriver.ko
            output/lsdriver.ko